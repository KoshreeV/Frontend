<!DOCTYPE html>
<html>
<head>
  <title>Employee Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<div class="dashboard">
  <header class="dashboard-header">
    <h1><i class="fas fa-tachometer-alt"></i> Employee Dashboard</h1>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </header>

  <div class="dashboard-content">
    <aside class="sidebar">
      <nav>
        <ul>
          <li class="active"><i class="fas fa-bullhorn"></i> Announcements</li>
          <li><i class="fas fa-user"></i> Profile</li>
          <li><i class="fas fa-bell"></i> Notifications</li>
        </ul>
      </nav>
    </aside>

    <main class="main-content">
      <div class="welcome-section">
        <h2><i class="fas fa-hand-wave"></i> Welcome back!</h2>
        <p>Stay updated with the latest announcements from your organization.</p>
      </div>

      <div class="section">
        <h2><i class="fas fa-bullhorn"></i> Latest Announcements</h2>
        <div id="list" class="announcements-list"></div>
      </div>
    </main>
  </div>
</div>

<script src="js/script.js"></script>

</body>
</html>
